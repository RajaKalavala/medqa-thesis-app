version: "3.9"

services:
  api:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    container_name: medqa-rag-api
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
      - ../results:/app/results
    restart: unless-stopped
